<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Tabuadas</h1>
    <label for="ntabuada"></label>
    <input type="number" id="ntabuada">
    <button>Calcular</button>

    <div id="tabuada"></div>

    <script>
        let button=document.querySelector("button")

        button.addEventListener("click", ()=>{
            n=Number(ntabuada.value);
                strResults=""
                for(let i=0;i<=10;i++){
                    strResults+=`${n}x${i}=${n*i}<br>`
            }
            tabuada.innerHTML=strResults;
        })
    </script>

</body>
</html>
