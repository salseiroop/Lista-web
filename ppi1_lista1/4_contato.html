<!DOCTYPE html>
<html>
<head>
    <title>Contato</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Formulário de Contato</h2>

<p>Preencha os campos abaixo corretamente para entrar em contato.</p>

<hr>

<form>

    <label for="nome">Nome:</label><br>
    <input type="text" id="nome" placeholder="Digite seu nome" required><br><br>

    <label for="email">E-mail:</label><br>
    <input type="email" id="email" placeholder="Digite seu email" required><br><br>

    <label for="assunto">Assunto:</label><br>
    <input type="text" id="assunto" placeholder="Digite o assunto"><br><br>

    <label for="estado">Estado:</label><br>
    <select id="estado">
        <option>Selecione</option>
        <option>SC</option>
        <option>PR</option>
        <option>RS</option>
    </select><br><br>

    <label for="mensagem">Mensagem:</label><br>
    <textarea id="mensagem" placeholder="Digite sua mensagem"></textarea><br><br>

    <button type="submit">Enviar</button>

</form>

<hr>

<a href="4_curriculo.html">Voltar para o currículo</a>

</body>
</html>
